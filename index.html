<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Admin Screen</title>

<style>
:root{
  --gold:#D4AF37;
  --gold-light:#E6C65A;
  --dark:#2F3542;
  --light:#f4f5f6;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:Lato, Arial, sans-serif;
  background:linear-gradient(180deg, #2F3542 0 260px, #eef1f3 260px 100%);
}

.header{
  text-align:center;
  color:#fff;
  padding:30px 10px 20px;
}

.header h1{
  margin:0;
  font-size:32px;
  font-family:Georgia, serif;
}

.container{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2{
  margin-top:0;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.tile{
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  background:#fafafa;
  cursor:pointer;
  text-align:center;
  font-weight:600;
}

.tile:hover{
  background:#f0f0f0;
}

.button{
  display:block;
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:linear-gradient(180deg, #E6C65A, #D4AF37);
}

.secondary{
  background:#2F3542;
  color:#fff;
}

.sidebar .tile{
  text-align:left;
}

@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Property Admin Screen</h1>
</div>

<div class="container">

  <!-- LEFT COLUMN -->
  <div>

    <div class="card">
      <h2>Quick Links</h2>
      <div class="grid">

        <div class="tile" onclick="openLink('https://example.com/rezi')">Rezi</div>
        <div class="tile" onclick="openLink('https://example.com/vouch')">Vouch</div>
        <div class="tile" onclick="openLink('https://example.com/countrywide')">Countrywide</div>
        <div class="tile" onclick="openLink('https://example.com/veriphy')">VERIPHY</div>
        <div class="tile" onclick="openLink('https://example.com/rightmoveplus')">Rightmove Plus</div>
        <div class="tile" onclick="openLink('https://example.com/bestprice')">Best Price Guide</div>
        <div class="tile" onclick="openLink('https://example.com/performance')">Property Performance</div>

      </div>
    </div>

    <div class="card">
      <h2>Client Apps</h2>

      <button class="button primary" onclick="openLink('property-launcher.html')">
        Launch Property Info App
      </button>

      <button class="button secondary" onclick="openLink('aml-launcher.html')">
        Launch AML Upload App
      </button>

    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="card sidebar">
    <h2>Research / Data</h2>

    <div class="tile" onclick="openLink('https://example.com/landinsight')">LandInsight</div>
    <div class="tile" onclick="openLink('https://example.com/spectre')">Spectre</div>
    <div class="tile" onclick="openLink('https://example.com/nationwide')">Nationwide HPI</div>
    <div class="tile" onclick="openLink('https://example.com/zoopla')">Zoopla</div>
    <div class="tile" onclick="openLink('https://example.com/rightmove')">Rightmove</div>
    <div class="tile" onclick="openLink('https://example.com/landregistry')">Land Registry</div>

  </div>

</div>

<script>
function openLink(url){
  window.open(url, '_blank');
}
</script>

</body>
</html>
