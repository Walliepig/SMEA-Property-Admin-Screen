<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Admin Screen</title>

<style>
body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg,#2F3542 0%, #eef1f3 100%);
}

.container {
  max-width:1100px;
  margin:0 auto;
  padding:30px 20px 60px;
}

h1 {
  text-align:center;
  color:#fff;
  margin-bottom:30px;
  font-size:34px;
}

.grid {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.card {
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2 {
  margin-top:0;
  margin-bottom:15px;
}

.btn-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn {
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  background:#f7f7f7;
  cursor:pointer;
  font-weight:600;
}

.btn:hover {
  background:#fff;
  border-color:#c9a227;
}

.full {
  grid-column: span 2;
}

.primary {
  background:linear-gradient(180deg,#E6C65A,#D4AF37);
  border:none;
}

.secondary {
  background:#2F3542;
  color:#fff;
  border:none;
}

.sidebar .btn {
  width:100%;
  margin-bottom:10px;
}

@media(max-width:800px){
  .grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Property Admin Screen</h1>

<div class="grid">

  <!-- LEFT SIDE -->
  <div>

    <!-- QUICK LINKS -->
    <div class="card">
      <h2>Quick Links</h2>

      <div class="btn-grid">
        <button class="btn" onclick="openLink('https://rezi.cloud')">Rezi</button>
        <button class="btn" onclick="openLink('https://vouch.co.uk')">Vouch</button>

        <button class="btn" onclick="openLink('https://countrywide-signs.co.uk')">Countrywide</button>
        <button class="btn" onclick="openLink('https://veriphy.com')">VERIPHY</button>

        <button class="btn" onclick="openLink('https://rightmove.co.uk')">Rightmove Plus</button>
        <button class="btn" onclick="openLink('https://rightmove.co.uk')">Best Price Guide</button>

        <button class="btn full" onclick="openLink('https://rightmove.co.uk')">Property Performance</button>
      </div>
    </div>

    <!-- CLIENT APPS -->
    <div class="card">
      <h2>Client Apps</h2>

      <button class="btn primary full" onclick="openLink('property-launcher.html')">
        Launch Property Info App
      </button>

      <button class="btn secondary full" onclick="openLink('aml-launcher.html')">
        Launch AML Upload App
      </button>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="card sidebar">
    <h2>Research / Data</h2>

    <button class="btn" onclick="openLink('https://landinsight.io')">LandInsight</button>
    <button class="btn" onclick="openLink('https://spectre.ai')">Spectre</button>
    <button class="btn" onclick="openLink('https://nationwidehousepriceindex.co.uk')">Nationwide HPI</button>
    <button class="btn" onclick="openLink('https://zoopla.co.uk')">Zoopla</button>
    <button class="btn" onclick="openLink('https://rightmove.co.uk')">Rightmove</button>
    <button class="btn" onclick="openLink('https://www.gov.uk/search-property-information-land-registry')">Land Registry</button>
  </div>

</div>

</div>

<script>
function openLink(url){
  window.open(url, '_blank');
}
</script>

</body>
</html>
