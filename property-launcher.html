<!DOCTYPE html>
<html>
<head>
<title>Property Info Launcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;padding:20px;max-width:600px;margin:auto}
input{width:100%;padding:10px;margin:6px 0}
button{padding:12px;width:100%;margin-top:10px}
</style>
</head>

<body>

<h2>Property Info Link Generator</h2>

<p><strong>Hint:</strong> Copy from Rezi to save time</p>

<input id="address1" placeholder="Address">
<input id="area" placeholder="Area">
<input id="town" placeholder="Town / City">
<input id="postcode" placeholder="Postcode">

<button onclick="copyPropertyInfoLink()">Create & Copy Link</button>
<button onclick="openPropertyInfoForm()">Open Form</button>

<script>
  const PROPERTY_FORM_BASE = "https://property-information-form.vercel.app/";
  
  function buildPropertyInfoLink() {
    const address1 = document.getElementById("address1").value.trim();
    const area = document.getElementById("area").value.trim();
    const town = document.getElementById("town").value.trim();
    const postcode = document.getElementById("postcode").value.trim();
  
    const params = new URLSearchParams({
      address1: address1,
      area: area,
      town: town,
      postcode: postcode
    });
  
    return `${PROPERTY_FORM_BASE}?${params.toString()}`;
  }
  
  function copyPropertyInfoLink() {
    const url = buildPropertyInfoLink();
    navigator.clipboard.writeText(url)
      .then(() => alert("Property link copied — ready to send"))
      .catch(() => alert("Copy failed"));
  }

  function openPropertyInfoForm() {
    const url = buildPropertyInfoLink();
    window.open(url, "_blank");
  }
</script>

</body>
</html>
